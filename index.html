<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
      integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./assets/CSS/style.css" />

    <title>COMMENT-CRUD</title>
  </head>
  <body>
    <div class="container mt-4">
      <div class="row">
        <div class="col-md-4 offset-md-4 mt-">
          <div class="card shadow border-danger">
            <div class="card-header text-center">
              <strong>ADD COMENT</strong>
            </div>
            <div class="card-body">
              <form id="commentForm">
                <div class="form-group">
                  <label for="name"><strong>Name</strong></label>
                  <input
                    type="text"
                    class="form-control"
                    placeholder="Name"
                    id="name"
                  />
                </div>
                <div class="form-group">
                  <label for="email"><strong>Email</strong></label>
                  <input
                    type="text"
                    class="form-control"
                    placeholder="Email"
                    id="email"
                  />
                </div>
                <div class="form-group">
                  <label for=""><strong>UserId</strong></label>
                  <select name="" id="postId" class="form-control">
                    <option value="">user 1</option>
                    <option value="">user 2</option>
                    <option value="">user 3</option>
                    <option value="">user 4</option>
                    <option value="">user 5</option>
                    <option value="">user 6</option>
                    <option value="">user 7</option>
                    <option value="">user 8</option>
                    <option value="">user 9</option>
                    <option value="">user 10</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="body"><strong>Comments</strong></label>
                  <input
                    type="text"
                    class="form-control"
                    placeholder="Comments"
                    id="body"
                  />
                </div>
                <button
                  class="btn btn-block btn-sm btn-light border border-info"
                  id="editBtn"
                >
                  Add Comments
                </button>
                <button
                  type="button"
                  class="btn btn-block d-none btn-sm btn-light border border-success"
                  id="updateBtn"
                >
                  Update Comments
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-12">
        <div class="row" id="cardContainer">
          <!-- <div class="col-md-6">
              <div class="card">
                <div class="card-header"></div>
                <div class="card-body">
                  <div></div>
                  <div></div>
                  <div></div>
                  <div></div>
                </div>
                <div class="card-footer d-flex justify-content-between">
                  <button class="btn btn-light border-info"></button>
                  <button class="btn btn-light border-danger"></button>
                </div>
              </div> -->
        </div>
      </div>
    </div>

    <div class="spinner d-none" id="spinner">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden"></span>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./assets/JS/app.js"></script>
  </body>
</html>
